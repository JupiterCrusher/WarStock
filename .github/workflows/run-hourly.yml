name: Run WW3 Risk Model Hourly

on:
  schedule:
    - cron: '0 * * * *'     # runs every hour (UTC)
  workflow_dispatch:         # allows manual testing

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install yfinance feedparser requests

      - name: Run risk model
        working-directory: backend
        run: python main.py

      - name: Commit and push updated scores
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backend/scores.json backend/errors.json || echo "Nothing to add"
          git commit -m "Update scores [CI]" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
